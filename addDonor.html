<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Add Donor</title>

<style>

body{
    font-family: Arial;
    text-align:center;
    background: linear-gradient(to right,#7b0000,#b3003c);
    color:white;
}

.container{
    margin-top:80px;
}

h1{
    font-size:40px;
    margin-bottom:40px;
}

form{
    background:white;
    padding:30px;
    border-radius:10px;
    display:inline-block;
    color:black;
}

input, select{
    padding:10px;
    width:250px;
    margin:10px;
    font-size:16px;
}

button{
    padding:10px 25px;
    font-size:18px;
    background:#7b0000;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#b3003c;
}

a{
    display:block;
    margin-top:20px;
    color:white;
    font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h1>Add Donor</h1>

<form th:action="@{/donor/add}" method="post">

<br>

<input type="text" name="name" placeholder="Enter Name" required>

<br>

<input type="text" name="phone" placeholder="Enter Phone Number" required>

<br>

<select name="bloodGroup" required>

<option value="">Select Blood Group</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>

</select>

<br><br>

<button type="submit">Add Donor</button>

</form>

<a href="/dashboard">Back to Dashboard</a>

</div>

</body>
</html>
