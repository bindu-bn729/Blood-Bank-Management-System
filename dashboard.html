<!DOCTYPE html><html>
<head>
<title>Dashboard</title><style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(#7a0019,#b3002d);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
text-align:center;
background:rgba(0,0,0,0.3);
padding:60px;
border-radius:12px;
}

h1{
font-size:42px;
margin-bottom:40px;
}

.buttons{
display:flex;

flex-wrap:wrap;
justify-content:center;
}

button{
width:220px;
padding:14px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
background:white;
color:#8B0000;
font-weight:bold;
}
</style></head><body><div class="container"><h1>Blood Bank Management System</h1><div class="buttons"><a href="/donor/add"><button>Add Donor</button></a>

<a href="/blood/issue"><button>Issue Blood</button></a>

<a href="/blood/view"><button>View Blood Stock</button></a>

<a href="/login"><button>Logout</button></a>

</div></div></body>
</html>
